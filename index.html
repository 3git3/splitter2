<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>24MB 分割ツール（ブラウザ内・無劣化）</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; padding: 20px; }
    input[type="number"] { width: 80px; }
    button { margin-right: 8px; }
    #status { margin-top: 12px; color: #333; }
    #result { margin-top: 12px; }
    li { margin-bottom: 6px; }
    .small { font-size: 12px; color: #666; margin-top: 12px; }
  </style>
</head>
<body>
  <h2>動画・音声を 24MB 前後で分割（ブラウザ内・無劣化）</h2>

  <div>
    <button id="loadBtn">ffmpeg を読み込む</button>
    <button id="clearBtn">状態クリア</button>
  </div>

  <div style="margin-top:12px;">
    <input type="file" id="fileInput" />
  </div>

  <div style="margin-top:12px;">
    <label>1チャンク最大サイズ（MB）:
      <input type="number" id="maxMB" value="24" min="1" />
    </label>
  </div>

  <div style="margin-top:12px;">
    <button id="splitBtn" disabled>分割する</button>
  </div>

  <p id="status"></p>

  <ul id="result"></ul>

  <p class="small">※ 処理はすべてブラウザ内で行われ、ファイルは外部に送信されません。必ず HTTP(s) サーバーで配信して開いてください（file:// では動きません）。</p>

  <script type="module">
  // --- 重要: 安定した CDN を指定し、corePath を明示する ---
  import { createFFmpeg, fetchFile } from "https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.mjs";

  // corePath は @ffmpeg/core の配布先を指す（unpkg の安定版を指定）
  const ffmpeg = createFFmpeg({
    log: true,
    corePath: "https://unpkg.com/@ffmpeg/core@0.11.1/dist/ffmpeg-core.js"
  });

  const loadBtn = document.getElementById("loadBtn");
  const splitBtn = document.getElementById("splitBtn");
  const clearBtn = document.getElementById("clearBtn");
  const fileInput = document.getElementById("fileInput");
  const statusEl = document.getElementById("status");
  const resultEl = document.getElementById("result");
  const maxMBInput = document.getElementById("maxMB");

  let loaded = false;

  function logStatus(msg) {
    statusEl.textContent = msg;
    console.log("[splitter]", msg);
  }

  loadBtn.addEventListener("click", async () => {
    try {
      if (!ffmpeg.isLoaded()) {
        logStatus("ffmpeg 読み込み中…（数秒〜数十秒かかる場合があります）");
        await ffmpeg.load();
      }
      loaded = true;
      splitBtn.disabled = false;
      logStatus("ffmpeg 読み込み完了。ファイルを選択してください。");
    } catch (err) {
      console.error("ffmpeg load error:", err);
      logStatus("ffmpeg の読み込みに失敗しました。コンソールを確認してください。");
    }
  });

  clearBtn.addEventListener("click", () => {
    statusEl.textContent = "";
    resultEl.innerHTML = "";
    fileInput.value = "";
  });

  // stderr から Duration を抽出
  function extractDuration(stderr) {
    const m = stderr.match(/Duration: (\d+):(\d+):(\d+\.\d+)/);
    if (!m) return null;
    const h = Number(m[1]), mm = Number(m[2]), s = Number(m[3]);
    return h * 3600 + mm * 60 + s;
  }

  splitBtn.addEventListener("click", async () => {
    const file = fileInput.files?.[0];
    if (!file) {
      logStatus("ファイルを選択してください。");
      return;
    }
    if (!loaded) {
      logStatus("まず ffmpeg を読み込んでください。");
      return;
    }

    try {
      resultEl.innerHTML = "";
      logStatus("ファイルを仮想FSに書き込み中…");
      const ext = (file.name.split(".").pop() || "bin").replace(/[^a-z0-9]/gi, "");
      const inputName = `input.${ext}`;
      ffmpeg.FS("writeFile", inputName, await fetchFile(file));

      // stderr を集める
      let stderr = "";
      ffmpeg.setLogger(({ type, message }) => {
        if (type === "fferr") stderr += message + "\n";
        // 追加ログはコンソールにも出す
        console[type === "fferr" ? "warn" : "log"]("[ffmpeg]", message);
      });

      logStatus("メタ情報取得（duration）…");
      // -i だけで情報が stderr に出る
      await ffmpeg.run("-i", inputName);

      const duration = extractDuration(stderr);
      if (!duration) {
        logStatus("duration を取得できませんでした。コンソールの ffmpeg 出力を確認してください。");
        return;
      }

      const maxMB = Math.max(1, Number(maxMBInput.value) || 24);
      const maxBytes = maxMB * 1024 * 1024;
      const bitrate = file.size / duration; // bytes per second
      const segmentTime = Math.max(1, Math.floor(maxBytes / bitrate)); // 秒（最低1秒）

      logStatus(`分割開始：1チャンク ≒ ${segmentTime} 秒（目標 ${maxMB} MB）`);

      const outPattern = `out%03d.${ext}`;

      // 無変換コピーでセグメント分割
      await ffmpeg.run(
        "-i", inputName,
        "-c", "copy",
        "-f", "segment",
        "-segment_time", String(segmentTime),
        "-reset_timestamps", "1",
        outPattern
      );

      // 出力ファイルを列挙してダウンロードリンクを作成
      for (let i = 0; i < 999; i++) {
        const name = `out${String(i).padStart(3, "0")}.${ext}`;
        try {
          const data = ffmpeg.FS("readFile", name);
          const blob = new Blob([data.buffer], { type: file.type || "application/octet-stream" });
          const url = URL.createObjectURL(blob);
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = url;
          a.download = name;
          a.textContent = `${name} (${Math.round(blob.size / 1024)} KB)`;
          li.appendChild(a);
          resultEl.appendChild(li);
        } catch (e) {
          break;
        }
      }

      logStatus("分割完了");
    } catch (err) {
      console.error("split error:", err);
      logStatus("分割中にエラーが発生しました。コンソールを確認してください。");
    }
  });

  // ブラウザ互換性チェック（簡易）
  (function checkCompatibility() {
    const ok = !!window.WebAssembly && !!window.fetch && !!window.ReadableStream;
    if (!ok) {
      console.warn("ブラウザが WebAssembly / fetch / ReadableStream をサポートしていない可能性があります。最新の Chrome/Edge/Firefox を使用してください。");
    }
  })();
  </script>
</body>
</html>
